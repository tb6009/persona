<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설문 시뮬레이터 — M&Serve</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR','Apple SD Gothic Neo',sans-serif; background:#f0f2f5; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    .topbar { background:#1a2e4a; color:white; padding:10px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .topbar a { font-size:11px; color:#7eb3e0; text-decoration:none; padding:3px 10px; border:1px solid #3a5a7a; border-radius:6px; flex-shrink:0; }
    .topbar-logo { font-size:13px; font-weight:700; letter-spacing:.1em; color:#7eb3e0; text-transform:uppercase; }
    .topbar-title { font-size:14px; font-weight:600; }
    .topbar-badge { margin-left:auto; background:#4a3a7a; font-size:11px; padding:3px 10px; border-radius:20px; }

    .main { display:flex; flex:1; overflow:hidden; }

    /* LEFT: PERSONA + QUESTION NAV */
    .left-panel { width:240px; background:#1a2e4a; display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
    .panel-section { padding:14px 16px 8px; }
    .panel-label { font-size:10px; font-weight:700; color:#5a7fa0; letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; }
    .persona-btn { display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; border-left:3px solid transparent; border-radius:6px; transition:all .15s; margin-bottom:4px; }
    .persona-btn:hover { background:rgba(255,255,255,.06); }
    .persona-btn.active { background:rgba(255,255,255,.1); border-left-color:#4a9fe0; }
    .pb-emoji { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .pb-name { font-size:12px; font-weight:600; color:#e0eaf5; }
    .pb-sub { font-size:10px; color:#5a7fa0; }
    .brand-tag { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:700; }
    .brand-mlida { background:#1e4d7b; color:#7eb3e0; }
    .brand-ahgreet { background:#2d4a1e; color:#8dc46a; }
    .brand-both { background:#4a2d1e; color:#e0a06a; }

    .divider { height:1px; background:rgba(255,255,255,.07); margin:8px 16px; }

    .q-nav { padding:0 10px 10px; }
    .q-nav-label { font-size:10px; font-weight:700; color:#5a7fa0; letter-spacing:.1em; text-transform:uppercase; padding:8px 6px 6px; }
    .q-section-head { font-size:10px; color:#4a7fa0; padding:6px 6px 3px; font-weight:600; letter-spacing:.05em; }
    .q-btn { display:flex; align-items:center; gap:6px; padding:5px 6px; border-radius:5px; cursor:pointer; font-size:11px; color:#7a9ab5; transition:all .12s; line-height:1.3; }
    .q-btn:hover { background:rgba(255,255,255,.06); color:#c0d8ee; }
    .q-btn.active { background:rgba(74,159,224,.2); color:#7eb3e0; font-weight:600; }
    .q-btn.answered { color:#4a9fe0; }
    .q-num { width:20px; height:20px; border-radius:50%; background:rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; font-weight:700; }
    .q-btn.answered .q-num { background:#4a9fe0; color:white; }
    .q-btn.active .q-num { background:#2e6da4; color:white; }

    /* CENTER: QUESTION + RESPONSE */
    .center { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .q-header { background:white; border-bottom:1px solid #e8edf2; padding:14px 24px; flex-shrink:0; }
    .q-progress { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .progress-bar { flex:1; height:5px; background:#eef2f6; border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:#4a9fe0; border-radius:3px; transition:width .3s ease; }
    .progress-label { font-size:11px; color:#9aafbe; white-space:nowrap; }
    .q-section-tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; background:#ede9fe; color:#7c3aed; margin-bottom:8px; display:inline-block; }
    .q-text { font-size:15px; font-weight:700; color:#1a2e4a; line-height:1.6; }
    .q-sub { font-size:11px; color:#9aafbe; margin-top:4px; }

    .q-body { flex:1; overflow-y:auto; padding:20px 24px; }

    /* RESPONSE AREA */
    .response-card { background:white; border-radius:14px; padding:20px; margin-bottom:16px; }
    .rc-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .rc-emoji { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .rc-name { font-size:14px; font-weight:700; color:#1a2e4a; }
    .rc-meta { font-size:11px; color:#9aafbe; }
    .rc-response { font-size:13px; color:#2e3f52; line-height:1.8; background:#f8fafc; border-radius:10px; padding:14px; border-left:3px solid; }
    .rc-empty { font-size:13px; color:#b0bec5; font-style:italic; padding:12px; text-align:center; }
    .respond-btn { margin-top:12px; font-size:12px; padding:8px 16px; border-radius:8px; border:none; cursor:pointer; font-weight:600; transition:all .15s; }
    .typing { display:flex; gap:4px; padding:8px 12px; align-items:center; }
    .typing-dot { width:6px; height:6px; border-radius:50%; background:#9aafbe; animation:blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay:.2s; }
    .typing-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

    /* ALL RESPONSES VIEW */
    .all-view { padding:20px 24px; overflow-y:auto; flex:1; }
    .all-title { font-size:14px; font-weight:700; color:#1a2e4a; margin-bottom:16px; }
    .all-response-item { background:white; border-radius:10px; padding:14px; margin-bottom:12px; }
    .ari-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }

    /* BOTTOM NAV */
    .q-footer { background:white; border-top:1px solid #e8edf2; padding:12px 24px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .nav-btn { padding:8px 20px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:600; transition:all .15s; }
    .nav-prev { background:#eef3f8; color:#2e5a8e; }
    .nav-prev:hover { background:#dbeafe; }
    .nav-next { background:#1a2e4a; color:white; }
    .nav-next:hover { background:#2e4f7a; }
    .nav-all { background:#f0f4f8; color:#5a7fa0; font-size:12px; }
    .export-btn { margin-left:auto; font-size:11px; padding:6px 12px; border:1px solid #4a9fe0; border-radius:6px; cursor:pointer; background:white; color:#2e6da4; }
    .export-btn:hover { background:#eef3f8; }

    /* RIGHT PROFILE */
    .right-panel { width:220px; background:white; border-left:1px solid #e8edf2; overflow-y:auto; flex-shrink:0; padding:16px; }
    .rp-title { font-size:10px; font-weight:700; color:#9aafbe; letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; }
    .ocean-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .ocean-label { font-size:10px; color:#7a8fa5; width:50px; flex-shrink:0; }
    .ocean-track { flex:1; height:6px; background:#eef2f6; border-radius:3px; overflow:hidden; }
    .ocean-fill { height:100%; border-radius:3px; }
    .ocean-score { font-size:10px; font-weight:700; color:#2e5a8e; width:14px; text-align:right; }
    .stat-item { display:flex; justify-content:space-between; font-size:11px; padding:5px 0; border-bottom:1px solid #f5f7fa; }
    .stat-key { color:#9aafbe; }
    .stat-val { color:#2e3f52; font-weight:600; }
    .no-sel { color:#b0bec5; font-size:12px; text-align:center; margin-top:40px; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#d0dce8; border-radius:4px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
  <a href="index.html">← 홈</a>
  <span class="topbar-logo">M&amp;Serve</span>
  <span class="topbar-title">설문 시뮬레이터 — 기준 설문 30문항</span>
  <span class="topbar-badge">Phase 2 · AI 페르소나</span>
</div>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-section">
      <div class="panel-label">페르소나 선택</div>
      <div id="persona-list"></div>
    </div>
    <div class="divider"></div>
    <div class="q-nav">
      <div class="q-nav-label">문항 목록</div>
      <div id="q-nav-list"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="q-header">
      <div class="q-progress">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <span class="progress-label" id="progress-label">0 / 30</span>
      </div>
      <div id="q-section-tag" class="q-section-tag">섹션</div>
      <div class="q-text" id="q-text">왼쪽에서 페르소나를 선택하세요</div>
      <div class="q-sub" id="q-sub"></div>
    </div>

    <div class="q-body" id="q-body">
      <div style="text-align:center;padding:60px 20px;color:#9aafbe;">
        <div style="font-size:48px;margin-bottom:16px;">📋</div>
        <div style="font-size:16px;font-weight:700;color:#5a7fa0;margin-bottom:8px;">설문 시뮬레이터</div>
        <div style="font-size:13px;line-height:1.7;">AI 페르소나 연구 프로토콜 기반 30문항으로<br>각 페르소나의 예상 응답을 시뮬레이션합니다.<br><br>왼쪽에서 페르소나를 선택하고<br>문항별 응답을 확인하세요.</div>
      </div>
    </div>

    <div class="q-footer">
      <button class="nav-btn nav-prev" id="btn-prev" onclick="navigate(-1)" disabled>← 이전</button>
      <button class="nav-btn nav-all" onclick="toggleAllView()">전체 보기</button>
      <button class="nav-btn nav-next" id="btn-next" onclick="navigate(1)" disabled>다음 →</button>
      <button class="export-btn" onclick="exportSurvey()">💾 결과 저장</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="rp-title">OCEAN 프로파일</div>
    <div id="ocean-panel"><div class="no-sel">페르소나를<br>선택하세요</div></div>
    <div style="margin-top:16px;"></div>
    <div class="rp-title">응답 현황</div>
    <div id="stats-panel"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  // SECTION A — 생활 전반
  { id:'A1', sec:'A. 생활', secColor:'#7c3aed', text:'평소 하루 루틴을 간단히 설명해 주시겠어요? 아침 기상부터 퇴근 후까지, 어떤 흐름으로 생활하세요?', sub:'AIO Lifestyle Model (Wells & Tigert, 1971)' },
  { id:'A2', sec:'A. 생활', secColor:'#7c3aed', text:'하루 중 \'나만의 시간\'이 있다면, 그 시간에 주로 무엇을 하시나요? 그게 본인에게 어떤 의미를 갖나요?', sub:'Self-concept theory (Sirgy, 1982)' },
  { id:'A3', sec:'A. 생활', secColor:'#7c3aed', text:'집이라는 공간이 본인에게 어떤 의미인가요? \'집에서 잘 산다\'는 게 어떤 모습인지 묘사해 주세요.', sub:'Home as haven concept (Sixsmith, 1986)' },
  { id:'A4', sec:'A. 생활', secColor:'#7c3aed', text:'최근 6개월 동안 가장 만족스럽게 구매한 물건이나 경험은 무엇이었나요? 그 이유는?', sub:'Peak experience in consumption (Holbrook & Hirschman, 1982)' },
  { id:'A5', sec:'A. 생활', secColor:'#7c3aed', text:'본인을 \'미니멀리스트\'라고 생각하시나요, 아니면 \'맥시멀리스트\'에 가깝나요? 왜 그렇게 생각하세요?', sub:'Voluntary simplicity (Etzioni, 1998)' },
  // SECTION B — 디자인 감수성
  { id:'B1', sec:'B. 디자인', secColor:'#1d4ed8', text:'평소 디자인을 \'좋다\'고 느낄 때, 어떤 요소가 가장 크게 작용하나요? (형태, 색상, 재질, 단순함 등)', sub:'Product aesthetics (Bloch, 1995)' },
  { id:'B2', sec:'B. 디자인', secColor:'#1d4ed8', text:'소형가전 같은 기능 제품에서도 디자인이 구매 결정에 영향을 미친다고 생각하세요? 본인의 경험은?', sub:'Form-function trade-off (Norman, 2004)' },
  { id:'B3', sec:'B. 디자인', secColor:'#1d4ed8', text:'지금 집에서 가장 \'예쁘다\'고 생각하는 물건은 무엇인가요? 그 물건의 어떤 점이 마음에 드세요?', sub:'Typicality vs. novelty in aesthetics (Hekkert et al., 2003)' },
  { id:'B4', sec:'B. 디자인', secColor:'#1d4ed8', text:'가전·주방 제품을 고를 때 \'집 인테리어와 어울리는가\'를 얼마나 고려하나요?', sub:'Ensemble effect in product design (Bloch, 1995)' },
  { id:'B5', sec:'B. 디자인', secColor:'#1d4ed8', text:'인스타그램·핀터레스트 등 SNS가 본인의 인테리어·제품 취향에 영향을 준다고 느끼나요? 어떻게?', sub:'Social influence on aesthetics (Childers et al., 2001)' },
  // SECTION C — 소비 생활
  { id:'C1', sec:'C. 소비', secColor:'#0f766e', text:'소형가전을 구매할 때 정보를 주로 어디서 얻으시나요? 온라인 리뷰, 지인 추천, 브랜드 SNS 등 비교해서 말씀해 주세요.', sub:'Information search behavior (Bettman, 1979)' },
  { id:'C2', sec:'C. 소비', secColor:'#0f766e', text:'구매 전 리뷰를 얼마나 꼼꼼히 보시나요? 어떤 종류의 리뷰가 신뢰가 가세요?', sub:'eWOM trust (Cheung & Thadani, 2012)' },
  { id:'C3', sec:'C. 소비', secColor:'#0f766e', text:'온라인 구매와 오프라인 구매 중 소형가전은 어디서 사는 편인가요? 그 이유는?', sub:'Multichannel shopping (Neslin et al., 2006)' },
  { id:'C4', sec:'C. 소비', secColor:'#0f766e', text:'구매를 \'망설이다가 결국 샀던\' 경험, 혹은 \'충동구매했다가 후회한\' 경험이 있으신가요?', sub:'Impulse buying vs. deliberate purchase (Rook, 1987)' },
  { id:'C5', sec:'C. 소비', secColor:'#0f766e', text:'제품 가격을 볼 때 \'이 정도면 합리적이다\'라고 느끼는 기준이 있나요? 어떻게 판단하세요?', sub:'Price fairness perception (Xia, Monroe & Cox, 2004)' },
  { id:'C6', sec:'C. 소비', secColor:'#0f766e', text:'어떤 브랜드의 제품을 한 번 구매한 뒤 다시 같은 브랜드를 선택한 경험이 있나요? 그 이유는?', sub:'Brand loyalty (Oliver, 1999)' },
  { id:'C7', sec:'C. 소비', secColor:'#0f766e', text:'제품을 구매할 때 \'지속 가능성\' 또는 \'오래 쓸 수 있는가\'를 고려하나요? 내구성 vs. 트렌드 중 무엇이 더 중요한가요?', sub:'Durability vs. obsolescence (Cooper, 2004)' },
  { id:'C8', sec:'C. 소비', secColor:'#0f766e', text:'구매 후 그 제품에 대해 주변에 이야기하거나 SNS에 올린 적 있나요? 어떤 경우에 공유하게 되나요?', sub:'Brand advocacy (Kumar et al., 2010)' },
  { id:'C9', sec:'C. 소비', secColor:'#0f766e', text:'\'이건 꼭 직접 써보거나 만져봐야 산다\'는 제품군이 있으신가요? 소형가전도 그런가요?', sub:'Tactile experience in purchase (Peck & Childers, 2003)' },
  { id:'C10', sec:'C. 소비', secColor:'#0f766e', text:'플래그십 스토어나 팝업스토어 같은 브랜드 오프라인 공간을 방문한 경험이 있으신가요? 구매에 영향을 줬나요?', sub:'Experiential retailing (Pine & Gilmore, 1998)' },
  // SECTION D — 밀다 브랜드 경험
  { id:'D1', sec:'D. 브랜드', secColor:'#b45309', text:'밀다를 처음 알게 된 계기는 무엇인가요? 그때 첫인상은 어떠셨나요?', sub:'Brand awareness & first impression (Keller, 1993)' },
  { id:'D2', sec:'D. 브랜드', secColor:'#b45309', text:'밀다의 어떤 점이 다른 소형가전 브랜드와 다르다고 느끼시나요?', sub:'Brand differentiation (Keller, 2003)' },
  { id:'D3', sec:'D. 브랜드', secColor:'#b45309', text:'밀다 제품을 처음 구매하기 전, 어떤 고민이 있었나요? 무엇이 최종 결정을 이끌었나요?', sub:'Laddering: attribute → consequence → value (Reynolds & Gutman, 1988)' },
  { id:'D4', sec:'D. 브랜드', secColor:'#b45309', text:'밀다 제품을 사용하면서 \'역시 잘 샀다\'고 느낀 순간이 있다면 언제였나요?', sub:'Post-purchase satisfaction (Oliver, 1980)' },
  { id:'D5', sec:'D. 브랜드', secColor:'#b45309', text:'반대로 밀다에 아쉬움이나 불만을 느낀 경험이 있나요? 어떤 상황이었나요?', sub:'Complaint behavior & expectation disconfirmation (Zeithaml et al., 1993)' },
  { id:'D6', sec:'D. 브랜드', secColor:'#b45309', text:'밀다라는 브랜드에 \'사람\'이 있다면 어떤 사람일 것 같나요? 성격, 스타일, 가치관으로 묘사해 주세요.', sub:'Brand personality (Aaker, 1997)' },
  { id:'D7', sec:'D. 브랜드', secColor:'#b45309', text:'밀다 제품을 주변에 추천한 적 있나요? 추천할 때 어떤 말로 설명하셨나요?', sub:'Net Promoter behavior (Reichheld, 2003)' },
  { id:'D8', sec:'D. 브랜드', secColor:'#b45309', text:'밀다 브랜드가 앞으로 어떻게 발전했으면 하나요? 제품 라인업, 디자인, 서비스 중 가장 기대하는 방향은?', sub:'Brand extension willingness (Aaker & Keller, 1990)' },

  let lastSec = '';
  QUESTIONS.forEach((q, i) => {
    if (q.sec !== lastSec) {
      const sh = document.createElement('div');
      sh.className = 'q-section-head';
      sh.textContent = q.sec;
      el.appendChild(sh);
      lastSec = q.sec;
    }
    const b = document.createElement('div');
    b.className = 'q-btn' + (i === currentQ ? ' active' : '');
    b.id = 'qb-' + i;
    const answered = currentPersona && answeredSet[currentPersona.id] && answeredSet[currentPersona.id][q.id];
    if (answered) b.classList.add('answered');
    b.onclick = () => goToQ(i);
    b.innerHTML = `<div class="q-num">${i + 1}</div><div style="flex:1;line-height:1.4">${q.id}. ${q.text.substring(0, 28)}...</div>`;
    el.appendChild(b);
  });
}

function selectPersona(id) {
  currentPersona = PERSONAS.find(p => p.id === id);
  if (!answeredSet[id]) answeredSet[id] = {};
  document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pb-' + id).classList.add('active');
  allView = false;
  goToQ(0);
  renderOceanPanel();
  renderStatsPanel();
}

function goToQ(idx) {
  currentQ = idx;
  allView = false;
  renderQNav();
  renderQuestion();
  updateProgress();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('q-section-tag').textContent = q.sec;
  document.getElementById('q-section-tag').style.background = q.secColor + '22';
  document.getElementById('q-section-tag').style.color = q.secColor;
  document.getElementById('q-text').textContent = `Q${currentQ + 1}. ${q.text}`;
  document.getElementById('q-sub').textContent = q.sub;

  const body = document.getElementById('q-body');
  if (!currentPersona) {
    body.innerHTML = '<div style="text-align:center;padding:60px;color:#9aafbe">페르소나를 선택하세요</div>';
    return;
  }

  const p = currentPersona;
  const responded = answeredSet[p.id] && answeredSet[p.id][q.id];
  const response = p.responses[q.id];
  const bc = p.brand === 'mlida' ? '#1e4d7b' : (p.brand === 'ahgreet' ? '#2d4a1e' : '#4a2d1e');
  const btnColor = p.brand === 'mlida' ? '#1e4d7b' : (p.brand === 'ahgreet' ? '#2d4a1e' : '#92400e');

  if (responded) {
    body.innerHTML = `
      <div class="response-card">
        <div class="rc-header">
          <div class="rc-emoji" style="background:${p.avatarBg}">${p.emoji}</div>
          <div><div class="rc-name">${p.name}</div><div class="rc-meta">${p.age}세 · ${p.job}</div></div>
        </div>
        <div class="rc-response" style="border-color:${bc}">${escHtml(response)}</div>
      </div>`;
    if (!answeredSet[p.id][q.id]) answeredSet[p.id][q.id] = true;
  } else {
    body.innerHTML = `
      <div class="response-card">
        <div class="rc-header">
          <div class="rc-emoji" style="background:${p.avatarBg}">${p.emoji}</div>
          <div><div class="rc-name">${p.name}</div><div class="rc-meta">${p.age}세 · ${p.job}</div></div>
        </div>
        ${response ? `<button class="respond-btn" style="background:${btnColor};color:white" onclick="showResponse('${q.id}')">💬 ${p.name}의 응답 보기</button>` : `<div class="rc-empty">이 문항에 대한 응답 데이터가 없습니다</div>`}
      </div>`;
  }

  document.getElementById('btn-prev').disabled = currentQ === 0;
  document.getElementById('btn-next').disabled = currentQ === QUESTIONS.length - 1;
}

function showResponse(qid) {
  if (!answeredSet[currentPersona.id]) answeredSet[currentPersona.id] = {};
  answeredSet[currentPersona.id][qid] = true;
  renderQuestion();
  renderQNav();
  renderStatsPanel();
  updateProgress();
}

function navigate(dir) {
  const next = currentQ + dir;
  if (next >= 0 && next < QUESTIONS.length) goToQ(next);
}

function toggleAllView() {
  allView = !allView;
  if (!allView) { renderQuestion(); return; }
  if (!currentPersona) return;
  const p = currentPersona;
  const bc = p.brand === 'mlida' ? '#1e4d7b' : (p.brand === 'ahgreet' ? '#2d4a1e' : '#4a2d1e');
  const body = document.getElementById('q-body');
  let html = `<div class="all-view">`;
  html += `<div class="all-title">📋 ${p.name}의 전체 응답 (${QUESTIONS.length}문항)</div>`;
  QUESTIONS.forEach((q, i) => {
    const resp = p.responses[q.id] || '(응답 없음)';
    html += `<div class="all-response-item">
      <div class="ari-header">
        <div style="font-size:11px;font-weight:700;color:${q.secColor};background:${q.secColor}22;padding:2px 7px;border-radius:4px">${q.id}</div>
        <div style="font-size:13px;font-weight:600;color:#1a2e4a;margin-left:6px">${q.text.substring(0,60)}...</div>
      </div>
      <div style="font-size:13px;color:#2e3f52;line-height:1.7;padding:8px 10px;background:#f8fafc;border-radius:8px;border-left:3px solid ${bc}">${escHtml(resp)}</div>
    </div>`;
  });
  html += '</div>';
  body.innerHTML = html;
}

function updateProgress() {
  const answered = currentPersona ? Object.keys(answeredSet[currentPersona.id] || {}).length : 0;
  const pct = (answered / QUESTIONS.length * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} / ${QUESTIONS.length}`;
}

function renderOceanPanel() {
  if (!currentPersona) return;
  const p = currentPersona;
  let html = '';
  Object.entries(p.ocean).forEach(([k, v]) => {
    html += `<div class="ocean-row">
      <div class="ocean-label">${oceanLabels[k]}</div>
      <div class="ocean-track"><div class="ocean-fill" style="width:${v*20}%;background:${oceanColors[k]}"></div></div>
      <div class="ocean-score">${v}</div>
    </div>`;
  });
  document.getElementById('ocean-panel').innerHTML = html;
}

function renderStatsPanel() {
  if (!currentPersona) return;
  const answered = Object.keys(answeredSet[currentPersona.id] || {}).length;
  document.getElementById('stats-panel').innerHTML = `
    <div class="stat-item"><span class="stat-key">진행</span><span class="stat-val">${answered} / 30</span></div>
    <div class="stat-item"><span class="stat-key">완료율</span><span class="stat-val">${(answered/30*100).toFixed(0)}%</span></div>
    <div class="stat-item"><span class="stat-key">현재</span><span class="stat-val">Q${currentQ+1}</span></div>
  `;
}

function exportSurvey() {
  if (!currentPersona) { alert('페르소나를 먼저 선택하세요'); return; }
  const p = currentPersona;
  let text = '='.repeat(52) + '\n';
  text += `M&Serve 설문 시뮬레이터 결과\n`;
  text += `페르소나: ${p.name} (${p.age}세 · ${p.job})\n`;
  text += `날짜: ${new Date().toLocaleDateString('ko-KR')}\n`;
  text += '='.repeat(52) + '\n\n';
  QUESTIONS.forEach((q, i) => {
    text += `[${q.id}] ${q.text}\n\n`;
    text += `→ ${p.name}: ${p.responses[q.id] || '(응답 없음)'}\n\n`;
    text += '-'.repeat(40) + '\n\n';
  });
  text += '='.repeat(52) + '\n';
  text += 'M&Serve Phase 2 소비자 심층조사 · AI 페르소나 연구\n';
  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `설문결과_${p.name}_${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

init();
</script>
</body>
</html>
